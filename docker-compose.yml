services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: datafrota-backend
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      PGHOST: ${DOCKER_PGHOST:-host.docker.internal}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-frota}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      SAAS_PGHOST: ${DOCKER_SAAS_PGHOST:-host.docker.internal}
      SAAS_PGPORT: ${SAAS_PGPORT:-5432}
      SAAS_PGDATABASE: ${SAAS_PGDATABASE:-datafrota}
      SAAS_PGUSER: ${SAAS_PGUSER:-postgres}
      SAAS_PGPASSWORD: ${SAAS_PGPASSWORD:-postgres}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: datafrota-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
